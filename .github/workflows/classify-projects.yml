name: Auto Classify Profile Projects

on:
  schedule:
    - cron: "0 1 * * 0" # Runs every Sunday at 1:00 AM UTC
  workflow_dispatch: # Allows manual trigger from the GitHub Actions tab

jobs:
  classify:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      repository-projects: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Run Auto-Classification Script
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node scripts/auto-classify-projects.js
